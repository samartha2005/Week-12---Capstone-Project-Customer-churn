<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Churn Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 6px 0 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #667eea;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            background: #f3f4f6;
        }

        .prediction {
            font-size: 18px;
            font-weight: bold;
        }

        .probability {
            font-size: 14px;
            color: #555;
        }

    </style>
</head>

<body>

<div class="container">
    <h2>Customer Churn Prediction</h2>

    <form action="/predict" method="post">

        <label>Tenure (months)</label>
        <input type="number" name="Tenure" required>

        <label>Monthly Charges</label>
        <input type="number" step="0.01" name="MonthlyCharges" required>

        <label>Total Charges</label>
        <input type="number" step="0.01" name="TotalCharges" required>

        <label>Senior Citizen</label>
        <select name="SeniorCitizen">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Contract Type</label>
        <select name="Contract">
            <option value="Month-to-month">Month-to-month</option>
            <option value="One year">One year</option>
            <option value="Two year">Two year</option>
        </select>

        <label>Payment Method</label>
        <select name="PaymentMethod">
            <option value="Electronic Check">Electronic Check</option>
            <option value="Mailed Check">Mailed Check</option>
            <option value="Credit Card">Credit Card</option>
        </select>

        <label>Paperless Billing</label>
        <select name="PaperlessBilling">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <button type="submit" class="btn">Predict Churn</button>
    </form>

    {% if prediction_text %}
    <div class="result">
        <div class="prediction">{{ prediction_text }}</div>
        <div class="probability">Churn Probability: {{ probability }}%</div>
    </div>
    {% endif %}

</div>

</body>
</html>
